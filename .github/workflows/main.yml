name: Deploy ZGF ERP

# 触发条件：当代码推送到 main 分支时自动执行
# 如果你希望合并 PR 时也触发，可以自行添加 pull_request 事件
on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码（虽然部署到远程服务器不一定需要，但建议保留以便后续扩展如运行测试）
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 通过 SSH 连接服务器并执行部署命令
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          # 在服务器上依次执行以下命令
          script: |
            echo "开始进入项目目录..."
            cd /root/ZGF_erp
            
            echo "进入虚拟环境并安装依赖..."
            # 激活虚拟环境并安装 requirements.txt 中的依赖
            source /root/ZGF_erp/venv/bin/activate
            pip install -r requirements.txt
            
            echo "重启系统服务..."
            # 使用 sudo 重启 systemd 服务
            sudo systemctl restart zgf_erp.service
            
            echo "部署完成！"
